<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Age of Epochs II (Classic UI)</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<link rel="stylesheet" href="classic-style.css">
<!-- Cookieless, privacy-first traffic analytics (GoatCounter): referrer/UTM
     acquisition data, no cookies, no IP stored, no consent banner needed.
     Skipped in the native (Capacitor) build — the beacon is web-only telemetry
     and window.Capacitor is injected before page scripts run. -->
<script>
if (!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform())) {
  var gc = document.createElement('script');
  gc.setAttribute('data-goatcounter', 'https://ageofepochs.goatcounter.com/count');
  gc.async = true; gc.src = 'https://gc.zgo.at/count.js';
  document.head.appendChild(gc);
}
</script>
</head><body class="classic-ui">
<!-- All shared markup (HUD, menus, overlays) lives in js/page-shell.js —
     this page and classic.html are thin variant shells so the two skins
     can never drift apart again. UI_VARIANT picks the skin-specific bits
     (idle-button placement, switch-link label). -->
<script>window.UI_VARIANT='classic';</script>
<script src="js/page-shell.js"></script>
<!-- Vendored locally (was unpkg) so the native/offline build has them in the
     bundle; also hardens the web build against a CDN outage. -->
