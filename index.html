<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Age of Empires II - Mini</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<link rel="stylesheet" href="styles.css"></head><body>
<canvas id="game"></canvas>
<div id="ui">
<div id="topbar">
<div class="res"><div class="res-icon sprite-icon icon-food"></div><div class="res-val" id="r-food">200</div></div>
<div class="res"><div class="res-icon sprite-icon icon-wood"></div><div class="res-val" id="r-wood">200</div></div>
<div class="res"><div class="res-icon sprite-icon icon-gold"></div><div class="res-val" id="r-gold">100</div></div>
<div class="res"><div class="res-icon sprite-icon icon-stone"></div><div class="res-val" id="r-stone">200</div></div>
<div id="pop">4/10</div>
<div id="mute-btn" onclick="toggleMute()" title="Mute/Unmute Audio">🔊</div>
<div id="menu-btn" onclick="toggleMenu()">Menu</div>
</div>
<div id="msg"></div>
<div id="help-hint"></div>
</div>
<div id="bottom">
<div id="actions"></div>
<div id="sel-info">
  <div id="sel-portrait" ondblclick="toggleCameraFollow()" title="Double-click to lock camera on this unit">⚔️</div>
  <div id="sel-stats">
    <div id="sel-name">AoE II Mini</div>
    <div id="sel-details">Tap to select, then tap map to command</div>
  </div>
  <div id="sel-grid"></div>
</div>
</div>
<div id="minimap-wrap"><canvas id="minimap"></canvas></div>

<div id="tutorial">
<div id="tutorial-box">
<img id="title-logo" src="logo.png" alt="Age of Empires II - Mini">

<div class="menu-divider"></div>

<div class="setup-row">
  <div class="setup-col">
    <h3>Difficulty</h3>
    <div class="segmented">
      <label class="segment"><input type="radio" name="difficulty" value="easy"><span>Easy</span></label>
      <label class="segment"><input type="radio" name="difficulty" value="standard" checked><span>Standard</span></label>
      <label class="segment"><input type="radio" name="difficulty" value="hard"><span>Hard</span></label>
    </div>
  </div>
  <div class="setup-col">
    <h3>Map Size</h3>
    <div class="segmented">
      <label class="segment"><input type="radio" name="mapsize" value="small"><span>Small</span></label>
      <label class="segment"><input type="radio" name="mapsize" value="medium" checked><span>Medium</span></label>
      <label class="segment"><input type="radio" name="mapsize" value="large"><span>Large</span></label>
    </div>
  </div>
</div>

<div class="menu-divider"></div>

<div class="menu-button-container">
  <button type="button" id="resume-game-btn" class="menu-action-btn" onclick="toggleMenu()" style="display: none;">
    RESUME MATCH
  </button>
  <button type="button" id="start-game-btn" class="menu-action-btn" onclick="onStartClicked()">
    START GAME
  </button>
</div>
</div>
</div>

<script src="js/audio.js"></script>
<script src="js/core.js"></script>
<script src="js/map.js"></script>
<script src="js/entities.js"></script>
<script src="js/pathfinding.js"></script>
<script src="js/iso.js"></script>
<script src="js/render.js"></script>
<script src="js/logic.js"></script>
<script src="js/ai.js"></script>
<script src="js/loop.js"></script>
<script src="js/ui.js"></script>
<script src="js/input.js"></script>
<script src="js/init.js"></script>
</body></html>
